<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SPEKMA – Sukan Pelajar TVET MARA</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- =============================================
       MENU BAR (sentiasa kelihatan — awam & staff)
  ============================================= -->
  <header class="topbar">
    <div class="topbar-inner">

      <div class="topbar-brand">
        <div class="topbar-logo">SPKM</div>
        <div class="topbar-titles">
          <span class="topbar-name">SPEKMA</span>
          <span class="topbar-sub">Sukan Pelajar TVET MARA</span>
        </div>
      </div>

      <nav class="topbar-nav">
        <button class="nav-btn active" onclick="setTab('kedudukan')">🏆 Kedudukan</button>
        <button class="nav-btn"        onclick="setTab('keputusan')">📋 Keputusan</button>
        <button class="nav-btn"        onclick="setTab('jadual')">📅 Jadual</button>
        <button class="nav-btn"        onclick="setTab('streaming')">📺 Live</button>

        <!-- Auth area -->
        <div id="auth-area">
          <button class="staff-login-btn" id="btn-buka-login" onclick="bukaPanelLogin()">
            🔒 Staff Login
          </button>
          <div class="staff-logged" id="staff-logged-info" style="display:none">
            <span class="staff-chip" id="nama-staff-chip">—</span>
            <button class="nav-btn tetapan-btn" onclick="setTab('tetapan')">⚙️ Tetapan</button>
            <button class="logout-btn" onclick="logKeluar()">Keluar</button>
          </div>
        </div>
      </nav>

      <button class="hamburger" onclick="togolMobileMenu()">☰</button>
    </div>

    <!-- Mobile dropdown -->
    <div class="mobile-menu" id="mobile-menu" style="display:none">
      <button class="mob-btn" onclick="setTab('kedudukan');togolMobileMenu()">🏆 Kedudukan</button>
      <button class="mob-btn" onclick="setTab('keputusan');togolMobileMenu()">📋 Keputusan</button>
      <button class="mob-btn" onclick="setTab('jadual');togolMobileMenu()">📅 Jadual</button>
      <button class="mob-btn" onclick="setTab('streaming');togolMobileMenu()">📺 Live</button>
      <div id="mob-auth">
        <button class="mob-btn mob-login-btn" onclick="bukaPanelLogin();togolMobileMenu()">🔒 Staff Login</button>
      </div>
    </div>
  </header>


  <!-- =============================================
       HERO BANNER
  ============================================= -->
  <div class="hero-banner">
    <div class="hero-inner">
      <div class="hero-badge">LIVE</div>
      <h1 class="hero-title">Kejohanan Sukan SPEKMA 2025</h1>
      <p class="hero-sub">Papan Kedudukan Rasmi &nbsp;·&nbsp; Sukan Pelajar TVET MARA</p>
    </div>
  </div>


  <!-- =============================================
       KANDUNGAN UTAMA
  ============================================= -->
  <main class="main-content" id="main-content"></main>


  <!-- =============================================
       MODAL LOGIN STAFF
  ============================================= -->
  <div class="modal-overlay" id="modal-overlay" style="display:none" onclick="tutupModal(event)">
    <div class="modal-box">
      <button class="modal-close" onclick="tutupPanelLogin()">×</button>
      <div class="modal-logo">SPKM</div>
      <div class="modal-title">Log Masuk Staff</div>
      <div class="modal-sub">Kemaskini Keputusan Sukan</div>
      <div id="modal-error" class="modal-error" style="display:none"></div>
      <div class="field-group">
        <label class="field-label">4 Digit Belakang No. IC</label>
        <input type="text" id="input-ic" class="field-input"
          placeholder="Contoh: 5678" maxlength="4" inputmode="numeric"
          onkeydown="if(event.key==='Enter') document.getElementById('input-password').focus()"/>
      </div>
      <div class="field-group">
        <label class="field-label">Kata Laluan</label>
        <div class="pw-wrap">
          <input type="password" id="input-password" class="field-input"
            placeholder="Masukkan kata laluan"
            onkeydown="if(event.key==='Enter') cubaLogin()"/>
          <button class="tgl-pw" onclick="togolPassword()">👁</button>
        </div>
      </div>
      <button class="login-btn" onclick="cubaLogin()">Log Masuk →</button>
      <p class="modal-note">Hubungi pentadbir sistem jika terlupa kata laluan.</p>
    </div>
  </div>


  <!-- =============================================
       URUTAN IMPORT JAVASCRIPT
       PENTING: jangan ubah susunan ini
  ============================================= -->
  <script src="config.js"></script>
  <script src="data.js"></script>
  <script src="auth.js"></script>
  <script src="format.js"></script>
  <script src="roundrobin.js"></script>
  <script src="streaming.js"></script>
  <script src="peringkat.js"></script>
  <script src="badminton.js"></script>
  <script src="cetak.js"></script>
  <script src="keputusan.js"></script>
  <script src="jadual.js"></script>
  <script src="tetapan.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="app.js"></script>

</body>
</html>
